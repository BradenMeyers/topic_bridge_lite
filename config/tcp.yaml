# ROS2 node parameters for TCP transport example.
# Topic definitions live in files loaded via config_file.
#
# Data flow:
#   TX side: encoder_node subscribes to 'input' topics, compresses,
#            publishes BridgeFrame → socket_node → TCP socket
#   RX side: TCP socket → socket_node → bridge_frame_in →
#            encoder_node decompresses and publishes on 'output' topics

/**:
  ros__parameters:
    # Parameters for both of the socket nodes
    queue_max:  16
    window_ms: 100
    network_interface: "network_bridge::TcpInterface"

    # Parameters for all encoder nodes
    use_addressing: true

    # Parameters for Encoder and Socket Nodes
    outbound_topic: "bridge_frame_out"
    inbound_topic:  "bridge_frame_in"
    status_topic:   "interface_status"


socket1:
  encoder_node:
    ros__parameters:
      config_file: "config/topics1.yaml"

      # If true, the path in config_file is treated as absolute instead of 
      # relative to the package share directory.
      # config_file_absolute: true 

  socket_node:
    ros__parameters:
      TcpInterface:
        role: "server" # "client" or "server"
        port: 5000 # Desired port to listen on
      

socket2:
  encoder_node:
    ros__parameters:
      config_file: "config/topics2.yaml"

  socket_node:
    ros__parameters:
      TcpInterface:
        role: "client" # "client" or "server"
        remote_address: "127.0.0.1" # IP of the server
        port: 5000 # Desired port to connect to