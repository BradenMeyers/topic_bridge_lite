/bt/encoder_node:
  ros__parameters:
    outbound_topic: "/bt/bridge_frame_out"
    inbound_topic:  "/bt/bridge_frame_in"
    status_topic:   "/bt/interface_status"
    use_addressing: false
    # config_file is injected by the launch file at runtime

/bt/bluetooth_transport_node:
  ros__parameters:
    # 'server' — wait for an incoming connection (no mac needed)
    # 'client' — actively connect to the remote device
    bt_role: "server"

    # Required in client mode. Find with: bluetoothctl devices
    # Example: "AA:BB:CC:DD:EE:FF"
    bt_mac_address: "E4:0D:36:FB:EC:D9"

    # RFCOMM channel to use (1-30). Both sides must agree on the same channel.
    bt_channel: 1

    outbound_topic: "/bt/bridge_frame_out"
    inbound_topic:  "/bt/bridge_frame_in"
    status_topic:   "/bt/interface_status"

    queue_max:  32
    window_ms: 100
