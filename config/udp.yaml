# ROS2 node parameters for the split encoder+transport architecture.
# Topic definitions live in udp_split_topics.yaml (loaded via config_file).
#
# Data flow:
#   TX side: encoder_node subscribes to 'input' topics, compresses,
#            publishes BridgeFrame → transport_node → UDP socket
#   RX side: UDP socket → transport_node → bridge_frame_in →
#            encoder_node decompresses and publishes on 'output' topics

# TODO add this
# The level of compression to use when sending data over the network (1-22).
# Beware that small messages may actually expand with high compression.
# Higher compression levels are good for large messages when bandwidth is
# small.  Lower compression levels are good for smaller messages or in
# cases where bandwidth is less limited than CPU.
# Launching with debug logging will show message size in bytes if you wish to tune this.
# default_zstd_level: 3

/**:
  ros__parameters:
    # Parameters for both of the socket nodes
    queue_max:  16
    window_ms: 100
    network_interface: "network_bridge::UdpInterface"

    # Parameters for Encoder and Socket Nodes
    outbound_topic: "bridge_frame_out"
    inbound_topic:  "bridge_frame_in"
    status_topic:   "interface_status"


socket1:
  encoder_node:
    ros__parameters:
      use_addressing: true
      config_file: "config/topics1.yaml"

      # If true, the path in config_file is treated as absolute instead of 
      # relative to the package share directory.
      # config_file_absolute: true 

  socket_node:
    ros__parameters:
      UdpInterface:
        local_address:  "127.0.0.1"
        receive_port:   5000
        remote_address: "127.0.0.1"
        send_port:      5001
      

socket2:
  encoder_node:
    ros__parameters:
      use_addressing: true
      config_file: "config/topics2.yaml"

  socket_node:
    ros__parameters:
      UdpInterface:
        local_address:  "127.0.0.1"
        receive_port:   5001
        remote_address: "127.0.0.1"
        send_port:      5000