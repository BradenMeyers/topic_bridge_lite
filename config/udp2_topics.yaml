  #   output:   /cmd_vel/forwarded
  #   type:     geometry_msgs/msg/Twist
  #   id:       1
  #   mode:     tx
  #   rate:     20.0
  #   priority: high
  #   queue_max: 2
  #
  # - input:    /cmd_vel
  #   output:   /cmd_vel/forwarded
  #   type:     geometry_msgs/msg/Twist
  #   id:       1
  #   mode:     rx