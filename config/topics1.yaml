node_addr: 1
topics:
  # Send /vector from udp1 side to udp2 side, republish as /vector/forwarded/a
  - input:    /vector     # Topic to subscribe to on the local ROS2 side
    output:   /vector/out1  # Output topic when recieving from the network
    type:     geometry_msgs/msg/Vector3Stamped  # ROS2 message type
    id:       0   # Message ID for this topic, used for multiplexing in the transport layer
    mode:     duplex  # Mode 'tx', 'rx', or 'duplex'
    rate:     100.0
    # dst_addr: 0x02   # optional: destination address when use_addressing is enabled
    # priority: medium
    # queue_max: 4

  # - input:    /vector/test
  #   output:   /vector/forwarded/a
  #   type:     geometry_msgs/msg/Vector3Stamped
  #   id:       1
  #   mode:     rx
  #   # src_addr: 0x01   # optional: filter RX to a specific sender's node_addr.
  #   #                  # Omitting src_addr (or setting it to 0) accepts frames from any source.

  # Example: send /cmd_vel with high priority
  # - input:    /cmd_vel
  #   output:   /cmd_vel/forwarded
  #   type:     geometry_msgs/msg/Twist
  #   id:       1
  #   mode:     tx
  #   rate:     20.0
  #   priority: high
  #   queue_max: 2
  #
  # - input:    /cmd_vel
  #   output:   /cmd_vel/forwarded
  #   type:     geometry_msgs/msg/Twist
  #   id:       1
  #   mode:     rx